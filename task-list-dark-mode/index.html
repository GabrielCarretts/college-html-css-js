<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <link rel="stylesheet" href="main.css">
</head>

<body class="light-theme">
    <div class="container">
        <header class="topbar">
            <div>
                <h1>Task List</h1>
                <p id="msg">Stay organized and track your progress.</p>
            </div>
            <button class="btn theme-btn" type="button">Dark</button>
        </header>

        <main class="card">
            <section class="task-section">
                <h2>Add a Task</h2>

                <form class="task-form" id="taskForm">
                    <input
                        type="text"
                        id="taskInput"
                        class="task-input"
                        placeholder="Enter a new task..."
                        required
                    >
                    <button type="submit" class="btn add-btn">Add Task</button>
                </form>
            </section>

            <section class="task-section">
                <h2>Current Tasks</h2>
                <ul class="task-list" id="taskList">
                    <li class="task-item done">
                        <span class="task-text">Add visual styles</span>
                        <div class="task-actions">
                            <button class="small-btn toggle-btn" type="button">Undo</button>
                            <button class="small-btn delete-btn" type="button">Delete</button>
                        </div>
                    </li>

                    <li class="task-item done">
                        <span class="task-text">Add light and dark themes</span>
                        <div class="task-actions">
                            <button class="small-btn toggle-btn" type="button">Undo</button>
                            <button class="small-btn delete-btn" type="button">Delete</button>
                        </div>
                    </li>

                    <li class="task-item">
                        <span class="task-text">Enable switching the theme</span>
                        <div class="task-actions">
                            <button class="small-btn toggle-btn" type="button">Done</button>
                            <button class="small-btn delete-btn" type="button">Delete</button>
                        </div>
                    </li>
                </ul>
            </section>

            <section class="task-section">
                <h2>Progress</h2>
                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number" id="pendingTasks">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <noscript>You need to enable JavaScript to view the full site.</noscript>
</body>
</html>
